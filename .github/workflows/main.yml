name: Run UI Tests

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --no-restore

    - name: Run Tests
      run: dotnet test
      continue-on-error: true

    - name: Install Allure CLI
      if: always()
      run: |
        curl -L -o allure.zip https://github.com/allure-framework/allure2/releases/latest/download/allure-2.27.0.zip
        powershell -Command "Expand-Archive allure.zip -DestinationPath ."
        echo "${{ github.workspace }}\allure-2.27.0\bin" >> $env:GITHUB_PATH

    - name: Generate Allure Report
      if: always()
      run: allure.bat generate **/allure-results --clean -o allure-report

    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report

    - name: Upload Raw Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: |
          **/allure-results
          **/Screenshots
